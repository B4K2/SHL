name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image references
        id: img
        run: |
          # GHCR requires a fully lowercase repository path.
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/${REPO_LC}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMAGE: ${{ steps.img.outputs.image }}
        run: |
          docker build \
            --secret id=gemini_api_key,env=GEMINI_API_KEY \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_ACTOR,GH_TOKEN,IMAGE_REF,CONTAINER_NAME,APP_PORT,GEMINI_API_KEY
          script: |
            set -euo pipefail
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull "$IMAGE_REF"
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 80:${APP_PORT} \
              -e GEMINI_API_KEY="$GEMINI_API_KEY" \
              "$IMAGE_REF"
            docker image prune -f
            docker logout ghcr.io
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ steps.img.outputs.ref }}
          CONTAINER_NAME: shl-recommender
          APP_PORT: 8000
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Health check
        run: |
          echo "Waiting for the service to become healthy (cold start can take ~2 min)..."
          for i in $(seq 1 30); do
            if curl -fsS "http://${{ secrets.EC2_HOST }}/health" | grep -q '"status"'; then
              echo "Service is healthy."
              exit 0
            fi
            echo "Attempt $i: not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Service did not become healthy in time."
          exit 1
